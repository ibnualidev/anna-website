<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anna Architecture | Visionary Design</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }

        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        p {
            font-size: 1.1rem;
            color: #888888;
            letter-spacing: 0.1em;
            margin-bottom: 40px;
        }

        button {
            background: transparent;
            color: #ffffff;
            border: 1px solid #ffffff;
            padding: 15px 35px;
            font-size: 0.9rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: #ffffff;
            color: #0a0a0a;
        }

        .grid-section {
            max-width: 1100px;
            margin: 0 auto;
            padding: 80px 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 40px 30px;
            text-align: left;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .card h3 {
            font-size: 1.4rem;
            font-weight: 400;
            margin-bottom: 15px;
            letter-spacing: 0.05em;
        }

        .card p {
            font-size: 0.95rem;
            color: #a0a0a0;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .card .arrow {
            color: #9933ff;
            font-size: 0.9rem;
            font-weight: 500;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: rgba(153, 51, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            cursor: pointer;
        }

        .card:hover .arrow {
            transform: translateX(6px);
        }

        /* Container Layout */
.grid-section {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
  gap: 32px;
  padding: 40px max(4vw, 20px);
  max-width: 1200px;
  margin: 0 auto;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

/* Stripe-Inspired Interactive Card */
.card {
  background: #ffffff;
  border-radius: 8px;
  overflow: hidden;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  /* Premium subtle shadow */
  box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 
              0 2px 4px -1px rgba(0, 0, 0, 0.03),
              0 0 0 1px rgba(0, 0, 0, 0.015);
  transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), 
              box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
}

/* Hover Physics */
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 
              0 10px 10px -5px rgba(0, 0, 0, 0.02),
              0 0 0 1px rgba(0, 0, 0, 0.02);
}

/* Precise Image Constraints */
.card-image-wrapper {
  position: relative;
  width: 100%;
  padding-top: 62.5%; /* Clean 16:10 aspect ratio */
  overflow: hidden;
  background-color: #f7f9fc;
}

.card-image {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s ease;
}

.card:hover .card-image {
  transform: scale(1.03); /* Subtle image zoom on card hover */
}

/* Card Content Typography */
.card-content {
  padding: 24px;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
}

.card-content h3 {
  margin: 0 0 8px 0;
  color: #0a2540; /* Stripe dark navy */
  font-size: 19px;
  font-weight: 600;
  letter-spacing: -0.01em;
}

.card-content p {
  margin: 0 0 20px 0;
  color: #635bff; /* Slate gray/blue description */
  font-size: 15px;
  line-height: 1.6;
}

/* Smooth Arrow Slide Effect */
.card-action {
  margin-top: auto;
  display: flex;
  align-items: center;
  color: #635bff; /* Stripe Signature Purple */
  font-size: 14px;
  font-weight: 600;
}

.arrow {
  margin-left: 4px;
  transition: transform 0.2s ease;
}

.card:hover .arrow {
  transform: translateX(4px); /* Arrow slides slightly right on hover */
}

    </style>
</head>
<body>

    <header>
        <h1>ANNA ARCHITECTS</h1>
        <p>Shaping space. Defining the future horizon.</p>
        <button>Explore Portfolio</button>
    </header>

    <section class="grid-section">
  <!-- Card 1: Cultural Hubs -->
  <div class="card">
    <div class="card-image-wrapper">
      <!-- High-end architectural placeholder from Unsplash -->
      <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80" alt="Cultural Hubs Project" class="card-image">
    </div>
    <div class="card-content">
      <h3>Cultural Hubs</h3>
      <p>State-of-the-art museum, gallery, and community exhibition spaces.</p>
      <div class="card-action">
        <span class="action-text">View Project</span>
        <span class="arrow">→</span>
      </div>
    </div>
  </div>

  <!-- Card 2: Luxury Residential -->
  <div class="card">
    <div class="card-image-wrapper">
      <!-- Minimalist residential placeholder from Unsplash -->
      <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?auto=format&fit=crop&w=800&q=80" alt="Luxury Residential Project" class="card-image">
    </div>
    <div class="card-content">
      <h3>Luxury Residential</h3>
      <p>Bespoke private estates blending modern minimalism with natural landscapes.</p>
      <div class="card-action">
        <span class="action-text">View Project</span>
        <span class="arrow">→</span>
      </div>
    </div>
  </div>
</section>

    <script>
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.addEventListener('click', () => {
                const projectType = card.querySelector('h3').innerText;
                alert(`Transitioning to ${projectType} Gallery instantly...`);
            });
        });
    </script>
</body>
</html>
